---
layout: default
---
<section class="wrap page-section">
  <div class="section-head">
    <span class="tag">[ BLOG ]</span>
    <h1>{{ page.title }}</h1>
  </div>
  <div class="post-list">
    {% for post in site.posts %}
    <a class="post-row" href="{{ post.url | relative_url }}">
      <span class="post-date mono">{{ post.date | date: "%b %d, %Y" }}</span>
      <span class="post-title">{{ post.title }}</span>
      <span class="post-arrow">&rarr;</span>
    </a>
    {% endfor %}
    {% if site.posts.size == 0 %}
    <p class="empty-note">No posts yet &mdash; add a markdown file to <code>_posts/</code> and it'll show up here.</p>
    {% endif %}
  </div>
</section>
